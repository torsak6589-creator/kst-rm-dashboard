<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ระบบตรวจสอบรายชื่อ KST</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0D1B2E;--navy2:#13243d;--navy3:#1a3055;
  --gold:#C8982A;--gold2:#e0b040;
  --cyan:#00D4FF;--text:#e8edf5;--muted:#8fa3c0;
  --green:#22c55e;--red:#ef4444;--orange:#f97316;
  --card:#192840;--border:#253a58;
}
body{font-family:'Noto Sans Thai',sans-serif;background:var(--navy);color:var(--text);min-height:100vh}
.header{background:linear-gradient(135deg,var(--navy) 0%,var(--navy2) 100%);border-bottom:2px solid var(--gold);padding:14px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.logo-badge{background:var(--gold);color:var(--navy);font-weight:700;font-size:13px;padding:4px 10px;border-radius:6px;letter-spacing:1px}
.header-title{flex:1}
.header-title h1{font-size:18px;font-weight:700;color:var(--text)}
.header-title p{font-size:12px;color:var(--muted)}
.stat-chip{background:var(--navy3);border:1px solid var(--border);border-radius:20px;padding:4px 14px;font-size:13px;color:var(--gold);font-family:'DM Mono',monospace;white-space:nowrap}
.sync-btn{background:var(--navy3);border:1px solid var(--border);border-radius:8px;padding:6px 12px;font-size:12px;color:var(--cyan);cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .2s;white-space:nowrap}
.sync-btn:hover{border-color:var(--cyan)}
.sync-btn:disabled{opacity:.5;cursor:not-allowed}
.tabs{display:flex;background:var(--navy2);border-bottom:1px solid var(--border);padding:0 16px}
.tab{padding:12px 20px;cursor:pointer;font-size:14px;color:var(--muted);border-bottom:3px solid transparent;transition:all .2s;white-space:nowrap}
.tab.active{color:var(--gold);border-bottom-color:var(--gold);font-weight:600}
.tab:hover:not(.active){color:var(--text)}
.content{padding:20px;max-width:800px;margin:0 auto}
.panel{display:none}.panel.active{display:block}

/* LOGIN SCREEN */
.login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center;padding:40px 20px}
.login-icon{font-size:64px;margin-bottom:20px}
.login-title{font-size:22px;font-weight:700;color:var(--gold);margin-bottom:8px}
.login-sub{font-size:14px;color:var(--muted);margin-bottom:32px;line-height:1.6}
.btn-login{background:var(--gold);color:var(--navy);border:none;border-radius:12px;padding:14px 36px;font-size:16px;font-weight:700;cursor:pointer;font-family:'Noto Sans Thai',sans-serif;transition:all .2s;display:flex;align-items:center;gap:10px}
.btn-login:hover{background:var(--gold2);transform:translateY(-1px)}
.btn-login svg{width:20px;height:20px}

/* LOADING */
.loading-screen{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px}
.spinner{width:48px;height:48px;border:4px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{color:var(--muted);font-size:14px}

/* ERROR */
.error-box{background:#1a0a0a;border:1px solid var(--red);border-radius:12px;padding:20px;margin-bottom:16px;color:#fca5a5;font-size:14px;line-height:1.6}
.error-box strong{color:var(--red);display:block;margin-bottom:6px}

/* SEARCH */
.search-wrap{position:relative;margin-bottom:20px}
.search-input{width:100%;background:var(--card);border:2px solid var(--border);border-radius:12px;padding:14px 50px 14px 18px;font-size:16px;color:var(--text);font-family:'Noto Sans Thai',sans-serif;outline:none;transition:border-color .2s}
.search-input:focus{border-color:var(--gold)}
.search-input::placeholder{color:var(--muted)}
.search-icon{position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:20px;color:var(--muted)}
.search-clear{position:absolute;right:44px;top:50%;transform:translateY(-50%);cursor:pointer;color:var(--muted);font-size:18px;display:none}
.result-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:12px;animation:slideIn .2s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.result-header{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.badge-found{background:#166534;color:#86efac;border-radius:20px;padding:3px 12px;font-size:12px;font-weight:600}
.badge-notfound{background:#7f1d1d;color:#fca5a5;border-radius:20px;padding:3px 12px;font-size:12px;font-weight:600}
.name-big{font-size:20px;font-weight:700;color:var(--gold2)}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.info-item{background:var(--navy2);border-radius:8px;padding:10px 14px}
.info-label{font-size:11px;color:var(--muted);margin-bottom:3px}
.info-value{font-size:14px;font-weight:600;color:var(--text);font-family:'DM Mono',monospace;display:flex;align-items:center;justify-content:space-between;gap:6px}
.info-value span{flex:1;word-break:break-all}
.copy-btn{background:var(--navy3);border:1px solid var(--border);color:var(--cyan);border-radius:6px;padding:3px 8px;font-size:11px;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s}
.copy-btn:hover{background:var(--gold);color:var(--navy);border-color:var(--gold)}
.transfer-box{background:var(--navy);border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin-top:10px}
.transfer-label{font-size:11px;color:var(--muted);margin-bottom:6px}
.transfer-text{font-size:13px;color:var(--cyan);font-family:'DM Mono',monospace;display:flex;align-items:center;justify-content:space-between;gap:10px}
.transfer-text span{flex:1}
.similar-wrap{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px;animation:slideIn .2s ease}
.similar-title{font-size:13px;color:var(--muted);margin-bottom:10px}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{background:var(--navy3);border:1px solid var(--border);border-radius:20px;padding:5px 14px;font-size:13px;cursor:pointer;transition:all .15s;color:var(--text)}
.chip:hover{border-color:var(--gold);color:var(--gold)}
.result-count{font-size:13px;color:var(--muted);margin-bottom:12px;padding:0 2px}

/* LIST */
.filter-bar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.filter-select{background:var(--card);border:1.5px solid var(--border);border-radius:8px;padding:8px 12px;font-size:13px;color:var(--text);font-family:'Noto Sans Thai',sans-serif;outline:none}
.search-list{flex:1;background:var(--card);border:1.5px solid var(--border);border-radius:8px;padding:8px 12px;font-size:13px;color:var(--text);font-family:'Noto Sans Thai',sans-serif;outline:none;min-width:150px}
.search-list::placeholder{color:var(--muted)}
.search-list:focus,.filter-select:focus{border-color:var(--gold)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--navy3);color:var(--gold);padding:10px 12px;text-align:left;font-weight:600}
td{padding:9px 12px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
tr:hover td{background:var(--navy2)}
.table-wrap{background:var(--card);border-radius:12px;overflow:hidden;overflow-x:auto}
.pagination{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:16px}
.pg-btn{background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:6px 14px;cursor:pointer;font-size:13px;font-family:'Noto Sans Thai',sans-serif;transition:all .15s}
.pg-btn:hover:not(:disabled){border-color:var(--gold);color:var(--gold)}
.pg-btn:disabled{opacity:.4;cursor:not-allowed}
.pg-info{font-size:13px;color:var(--muted)}
.bank-pill{display:inline-block;background:var(--navy3);border-radius:4px;padding:2px 8px;font-size:11px;color:var(--muted);white-space:nowrap}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--green);color:#fff;padding:10px 20px;border-radius:10px;font-size:14px;font-weight:600;z-index:9999;animation:fadeUp .3s ease;pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,.4)}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* LAST SYNC */
.sync-info{font-size:12px;color:var(--muted);text-align:center;padding:8px;margin-bottom:4px}

@media(max-width:600px){
  .info-grid{grid-template-columns:1fr}
  .tab{padding:10px 12px;font-size:13px}
  .content{padding:14px}
  .header{flex-wrap:wrap;gap:8px}
}
</style>
</head>
<body>

<div class="header">
  <div class="logo-badge">KST</div>
  <div class="header-title">
    <h1>ระบบตรวจสอบรายชื่อ</h1>
    <p>ฝ่ายจัดซื้อวัตถุดิบ · Branch KH</p>
  </div>
  <div id="totalChip" class="stat-chip" style="display:none">— รายการ</div>
  <button class="sync-btn" id="syncBtn" style="display:none" onclick="syncData()">
    🔄 Sync
  </button>
</div>

<div class="tabs" id="tabBar" style="display:none">
  <div class="tab active" onclick="switchTab('search',this)">🔍 ค้นหา</div>
  <div class="tab" onclick="switchTab('list',this)">📜 รายชื่อทั้งหมด</div>
</div>

<div class="content">
  <!-- LOGIN -->
  <div id="loginScreen" class="login-screen">
    <div class="login-icon">🔐</div>
    <div class="login-title">เข้าสู่ระบบด้วย Microsoft 365</div>
    <div class="login-sub">
      ระบบจะดึงข้อมูลรายชื่อจากไฟล์ Excel ใน OneDrive ของคุณโดยตรง<br>
      ข้อมูลอัปเดตทุกครั้งที่กด Sync
    </div>
    <button class="btn-login" onclick="login()">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M11.5 2.75L2 7.5v9l9.5 4.75L21 16.5v-9L11.5 2.75zM4 15.18V8.82l7.5 3.75 7.5-3.75v6.36l-7.5 3.75-7.5-3.75z"/></svg>
      เข้าสู่ระบบ Microsoft
    </button>
    <div id="loginError" style="margin-top:16px;color:var(--red);font-size:13px;display:none"></div>
  </div>

  <!-- LOADING -->
  <div id="loadingScreen" class="loading-screen">
    <div class="spinner"></div>
    <div class="loading-text" id="loadingText">กำลังโหลดข้อมูล…</div>
  </div>

  <!-- MAIN PANELS -->
  <div id="mainContent" style="display:none">
    <div id="errorBox" class="error-box" style="display:none"></div>
    <div class="sync-info" id="syncInfo"></div>

    <!-- SEARCH PANEL -->
    <div class="panel active" id="panel-search">
      <div class="search-wrap">
        <input class="search-input" id="searchInput" type="text" placeholder="พิมพ์ชื่อ, เลขบัญชี, หรือเบอร์โทร…" oninput="doSearch()" autocomplete="off">
        <span class="search-clear" id="clearBtn" onclick="clearSearch()">✕</span>
        <span class="search-icon">🔍</span>
      </div>
      <div id="searchResult"></div>
    </div>

    <!-- LIST PANEL -->
    <div class="panel" id="panel-list">
      <div class="filter-bar">
        <input class="search-list" id="listSearch" placeholder="ค้นหาในรายชื่อ…" oninput="renderList()">
        <select class="filter-select" id="bankFilter" onchange="renderList()">
          <option value="">ธนาคารทั้งหมด</option>
        </select>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>#</th><th>ชื่อ-นามสกุล</th><th>ธนาคาร</th><th>เลขบัญชี</th><th>เบอร์โทร</th>
          </tr></thead>
          <tbody id="listBody"></tbody>
        </table>
      </div>
      <div class="pagination">
        <button class="pg-btn" id="prevBtn" onclick="changePage(-1)">‹ ก่อนหน้า</button>
        <span class="pg-info" id="pgInfo"></span>
        <button class="pg-btn" id="nextBtn" onclick="changePage(1)">ถัดไป ›</button>
      </div>
    </div>
  </div>
</div>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
const CLIENT_ID = '2459a57b-bd24-4c19-8f82-1b1d607bd11a';
const TENANT_ID = '1a4d139b-4e96-4d3b-8cfd-007453cc609e';
const SCOPES    = ['Files.Read', 'User.Read'];
const FILE_NAME = 'supplier.xlsx';  // ← ชื่อไฟล์ใน OneDrive
const SHEET_NAME = 'supplier';      // ← ชื่อ sheet

// ─── STATE ────────────────────────────────────────────────────────────────────
let DB = [];
let accessToken = null;
let listPage = 1;
const PAGE_SIZE = 25;

// ─── MSAL (PKCE via popup — no library needed) ────────────────────────────────
function generateCodeVerifier() {
  const array = new Uint8Array(32);
  crypto.getRandomValues(array);
  return btoa(String.fromCharCode(...array)).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}
async function generateCodeChallenge(verifier) {
  const enc = new TextEncoder().encode(verifier);
  const hash = await crypto.subtle.digest('SHA-256', enc);
  return btoa(String.fromCharCode(...new Uint8Array(hash))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}

async function login() {
  document.getElementById('loginError').style.display = 'none';
  try {
    const verifier   = generateCodeVerifier();
    const challenge  = await generateCodeChallenge(verifier);
    const redirectUri = window.location.href.split('?')[0].split('#')[0];
    const state = Math.random().toString(36).slice(2);

    sessionStorage.setItem('pkce_verifier', verifier);
    sessionStorage.setItem('pkce_state', state);
    sessionStorage.setItem('redirect_uri', redirectUri);

    const authUrl = `https://login.microsoftonline.com/${TENANT_ID}/oauth2/v2.0/authorize`
      + `?client_id=${CLIENT_ID}`
      + `&response_type=code`
      + `&redirect_uri=${encodeURIComponent(redirectUri)}`
      + `&scope=${encodeURIComponent(SCOPES.join(' '))}`
      + `&code_challenge=${challenge}`
      + `&code_challenge_method=S256`
      + `&state=${state}`;

    window.location.href = authUrl;
  } catch(e) {
    showLoginError('เกิดข้อผิดพลาด: ' + e.message);
  }
}

async function handleRedirect() {
  const params = new URLSearchParams(window.location.search);
  const code  = params.get('code');
  const state = params.get('state');
  const error = params.get('error');

  if (error) {
    showLoginError('Microsoft ปฏิเสธการเข้าสู่ระบบ: ' + (params.get('error_description') || error));
    window.history.replaceState({}, '', window.location.pathname);
    return;
  }

  if (!code) return; // ยังไม่ได้ login

  const savedState   = sessionStorage.getItem('pkce_state');
  const verifier     = sessionStorage.getItem('pkce_verifier');
  const redirectUri  = sessionStorage.getItem('redirect_uri');

  if (state !== savedState) {
    showLoginError('State mismatch — กรุณาลองใหม่');
    window.history.replaceState({}, '', window.location.pathname);
    return;
  }

  // Clear URL
  window.history.replaceState({}, '', window.location.pathname);

  showLoading('กำลังแลก token…');

  try {
    const resp = await fetch(`https://login.microsoftonline.com/${TENANT_ID}/oauth2/v2.0/token`, {
      method: 'POST',
      headers: {'Content-Type':'application/x-www-form-urlencoded'},
      body: new URLSearchParams({
        client_id: CLIENT_ID,
        grant_type: 'authorization_code',
        code,
        redirect_uri: redirectUri,
        code_verifier: verifier,
        scope: SCOPES.join(' ')
      })
    });
    const data = await resp.json();
    if (data.error) throw new Error(data.error_description || data.error);

    accessToken = data.access_token;
    // Store refresh token if available for later use
    if (data.refresh_token) sessionStorage.setItem('refresh_token', data.refresh_token);

    await loadData();
  } catch(e) {
    hideLoading();
    showLoginError('Token error: ' + e.message);
  }
}

// ─── LOAD DATA FROM ONEDRIVE ──────────────────────────────────────────────────
async function loadData() {
  showLoading('กำลังค้นหาไฟล์ใน OneDrive…');
  try {
    // Search for file by name
    const searchRes = await graphGet(`/me/drive/root/search(q='${encodeURIComponent(FILE_NAME)}')?$select=id,name,parentReference`);
    const items = searchRes.value || [];
    const file = items.find(i => i.name === FILE_NAME || i.name.toLowerCase() === FILE_NAME.toLowerCase());

    if (!file) throw new Error(`ไม่พบไฟล์ "${FILE_NAME}" ใน OneDrive กรุณาตรวจสอบชื่อไฟล์`);

    setLoadingText('กำลังดาวน์โหลดไฟล์ Excel…');
    const driveId = file.parentReference?.driveId;
    const fileId  = file.id;

    // Download file content
    const downloadRes = await fetch(
      `https://graph.microsoft.com/v1.0/drives/${driveId}/items/${fileId}/content`,
      { headers: { Authorization: 'Bearer ' + accessToken } }
    );
    if (!downloadRes.ok) throw new Error('ดาวน์โหลดไฟล์ไม่สำเร็จ: ' + downloadRes.status);

    const blob = await downloadRes.arrayBuffer();

    setLoadingText('กำลังอ่านข้อมูล…');
    const workbook = XLSX.read(blob, { type: 'array' });
    const sheetName = workbook.SheetNames.find(s => s === SHEET_NAME) || workbook.SheetNames[0];
    const ws = workbook.Sheets[sheetName];
    const rows = XLSX.utils.sheet_to_json(ws, { defval: '' });

    DB = rows.map((r, i) => ({
      n:  String(r['ชื่อ']         || '').trim(),
      b:  String(r['โอนบัญชี']     || '').trim(),
      a:  String(r['เลขที่บัญชี']  || '').trim(),
      bk: String(r['ธนาคาร']       || '').trim(),
      p:  String(r['เบอร์โทร']     || '').trim(),
      _id: i
    })).filter(r => r.n);

    const now = new Date().toLocaleString('th-TH');
    document.getElementById('syncInfo').textContent = `🔄 อัปเดตล่าสุด: ${now} · ${DB.length} รายการ`;
    document.getElementById('totalChip').textContent = DB.length + ' รายการ';

    showMain();
    populateBankFilter();
  } catch(e) {
    hideLoading();
    showError(e.message);
    showMain();
  }
}

async function syncData() {
  if (!accessToken) { login(); return; }
  document.getElementById('syncBtn').disabled = true;
  document.getElementById('syncBtn').textContent = '⏳ กำลัง Sync…';
  try { await loadData(); } catch(e) { showError(e.message); }
  document.getElementById('syncBtn').disabled = false;
  document.getElementById('syncBtn').innerHTML = '🔄 Sync';
}

async function graphGet(path) {
  const res = await fetch('https://graph.microsoft.com/v1.0' + path, {
    headers: { Authorization: 'Bearer ' + accessToken }
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err?.error?.message || 'Graph API error ' + res.status);
  }
  return res.json();
}

// ─── UI HELPERS ───────────────────────────────────────────────────────────────
function showLoading(txt) {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('loadingScreen').style.display = 'flex';
  document.getElementById('mainContent').style.display = 'none';
  document.getElementById('tabBar').style.display = 'none';
  document.getElementById('totalChip').style.display = 'none';
  document.getElementById('syncBtn').style.display = 'none';
  document.getElementById('loadingText').textContent = txt || 'กำลังโหลด…';
}
function setLoadingText(t) { document.getElementById('loadingText').textContent = t; }
function hideLoading() {
  document.getElementById('loadingScreen').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
}
function showMain() {
  document.getElementById('loadingScreen').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('mainContent').style.display = 'block';
  document.getElementById('tabBar').style.display = 'flex';
  document.getElementById('totalChip').style.display = 'block';
  document.getElementById('syncBtn').style.display = 'flex';
}
function showError(msg) {
  const box = document.getElementById('errorBox');
  box.style.display = 'block';
  box.innerHTML = `<strong>⚠️ เกิดข้อผิดพลาด</strong>${escH(msg)}`;
}
function showLoginError(msg) {
  const el = document.getElementById('loginError');
  el.textContent = msg;
  el.style.display = 'block';
}

// ─── TABS ─────────────────────────────────────────────────────────────────────
function switchTab(name, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('panel-' + name).classList.add('active');
  if (name === 'list') renderList();
}

// ─── SEARCH ───────────────────────────────────────────────────────────────────
function normalise(s) { return (s || '').replace(/\s+/g,' ').trim().toLowerCase(); }

function doSearch() {
  const q = normalise(document.getElementById('searchInput').value);
  document.getElementById('clearBtn').style.display = q ? 'block' : 'none';
  const out = document.getElementById('searchResult');
  if (!q) { out.innerHTML = ''; return; }

  const hits = DB.filter(r =>
    normalise(r.n).includes(q) ||
    (r.a || '').replace(/[-\s]/g,'').includes(q.replace(/[-\s]/g,'')) ||
    (r.p || '').replace(/[-\s]/g,'').includes(q.replace(/[-\s]/g,''))
  );

  if (hits.length === 0) {
    const sugg = DB.filter(r => {
      const nm = normalise(r.n);
      return q.split('').some(c => nm.includes(c)) && nm.length < 40;
    }).slice(0, 8);
    out.innerHTML = `
      <div class="result-card">
        <div class="result-header"><span class="badge-notfound">❌ ไม่พบ</span>
          <span>ไม่พบ "<strong style="color:var(--gold)">${escH(q)}</strong>" ในระบบ</span>
        </div>
      </div>
      ${sugg.length ? `<div class="similar-wrap">
        <div class="similar-title">🔎 ชื่อที่คล้ายกัน</div>
        <div class="chips">${sugg.map(r => `<div class="chip" onclick="fillSearch('${escJ(r.n)}')">${escH(r.n)}</div>`).join('')}</div>
      </div>` : ''}`;
    return;
  }

  out.innerHTML = `<div class="result-count">พบ ${hits.length} รายการ</div>` +
    hits.map(r => renderCard(r)).join('');
}

function renderCard(r) {
  return `<div class="result-card">
    <div class="result-header"><span class="badge-found">✅ พบรายชื่อ</span></div>
    <div class="name-big">${escH(r.n)}</div>
    <div class="info-grid" style="margin-top:14px">
      <div class="info-item">
        <div class="info-label">ธนาคาร</div>
        <div class="info-value"><span>${escH(r.bk || '-')}</span></div>
      </div>
      <div class="info-item">
        <div class="info-label">เบอร์โทร</div>
        <div class="info-value"><span>${escH(r.p || '-')}</span>${r.p ? `<button class="copy-btn" onclick="cp('${escJ(r.p)}',this)">📋</button>` : ''}</div>
      </div>
      <div class="info-item" style="grid-column:1/-1">
        <div class="info-label">เลขที่บัญชี</div>
        <div class="info-value">
          <span style="font-size:16px">${escH(r.a || '-')}</span>
          ${r.a ? `<button class="copy-btn" onclick="cp('${escJ(r.a)}',this)">📋 คัดลอก</button>` : ''}
        </div>
      </div>
    </div>
    ${r.b ? `<div class="transfer-box">
      <div class="transfer-label">📤 ข้อความโอนบัญชี</div>
      <div class="transfer-text"><span>${escH(r.b)}</span><button class="copy-btn" onclick="cp('${escJ(r.b)}',this)">📋 คัดลอก</button></div>
    </div>` : ''}
  </div>`;
}

function fillSearch(name) {
  document.getElementById('searchInput').value = name;
  document.getElementById('clearBtn').style.display = 'block';
  doSearch();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('clearBtn').style.display = 'none';
  document.getElementById('searchResult').innerHTML = '';
}

// ─── LIST ─────────────────────────────────────────────────────────────────────
function populateBankFilter() {
  const banks = [...new Set(DB.map(r => r.bk).filter(Boolean))].sort();
  const sel = document.getElementById('bankFilter');
  sel.innerHTML = '<option value="">ธนาคารทั้งหมด</option>';
  banks.forEach(b => {
    const o = document.createElement('option');
    o.value = b; o.textContent = b.replace('ธนาคาร','');
    sel.appendChild(o);
  });
}

function renderList() {
  const q  = normalise(document.getElementById('listSearch').value);
  const bk = document.getElementById('bankFilter').value;
  let rows = DB.filter(r =>
    (!q || normalise(r.n).includes(q) || (r.a||'').includes(q) || (r.p||'').includes(q)) &&
    (!bk || r.bk === bk)
  );
  const total = rows.length;
  const pages = Math.max(1, Math.ceil(total / PAGE_SIZE));
  if (listPage > pages) listPage = 1;
  const slice = rows.slice((listPage - 1) * PAGE_SIZE, listPage * PAGE_SIZE);

  const tbody = document.getElementById('listBody');
  if (slice.length === 0) {
    tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;color:var(--muted);padding:30px">ไม่พบข้อมูล</td></tr>`;
  } else {
    tbody.innerHTML = slice.map((r, i) => `<tr onclick="goSearch('${escJ(r.n)}')" style="cursor:pointer">
      <td style="color:var(--muted);font-family:'DM Mono',monospace">${(listPage-1)*PAGE_SIZE+i+1}</td>
      <td><strong>${escH(r.n)}</strong></td>
      <td><span class="bank-pill">${escH((r.bk||'').replace('ธนาคาร',''))}</span></td>
      <td style="font-family:'DM Mono',monospace;font-size:12px">${escH(r.a||'-')}</td>
      <td style="color:var(--muted)">${escH(r.p||'-')}</td>
    </tr>`).join('');
  }

  document.getElementById('pgInfo').textContent = `หน้า ${listPage}/${pages} (${total} รายการ)`;
  document.getElementById('prevBtn').disabled = listPage <= 1;
  document.getElementById('nextBtn').disabled = listPage >= pages;
}

function changePage(d) { listPage += d; renderList(); }

function goSearch(name) {
  document.querySelectorAll('.tab')[0].click();
  fillSearch(name);
}

// ─── UTILS ────────────────────────────────────────────────────────────────────
function cp(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.textContent;
    btn.textContent = '✓ คัดลอกแล้ว!';
    setTimeout(() => btn.textContent = orig, 1500);
    showToast('📋 คัดลอกแล้ว');
  });
}

let toastTimer;
function showToast(msg, color='#22c55e') {
  const old = document.querySelector('.toast');
  if (old) old.remove();
  clearTimeout(toastTimer);
  const t = document.createElement('div');
  t.className = 'toast'; t.style.background = color; t.textContent = msg;
  document.body.appendChild(t);
  toastTimer = setTimeout(() => t.remove(), 2500);
}

function escH(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escJ(s){ return String(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

// ─── INIT ─────────────────────────────────────────────────────────────────────
handleRedirect();
</script>
