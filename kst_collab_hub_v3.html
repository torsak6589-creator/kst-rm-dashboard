<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KST Collaborative Hub v3</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script src="https://alcdn.msauth.net/browser/2.38.3/js/msal-browser.min.js"></script>
<style>
:root{
  --void:#0A0F1E;--navy:#1A1F3E;
  --cyan:#00E5FF;--cd:rgba(0,229,255,0.12);
  --violet:#7B61FF;--vd:rgba(123,97,255,0.12);
  --silver:#E8ECF1;--slate:#6B7A8D;
  --ok:#00D68F;--warn:#FFB800;--err:#FF4757;--org:#FF9F43;
  --glass:rgba(26,31,62,0.7);--bd:rgba(0,229,255,0.12);
  --bg:#070B17;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans Thai','DM Sans',sans-serif;background:var(--bg);color:var(--silver);min-height:100vh;font-size:13px}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 15% 25%,rgba(123,97,255,0.07),transparent 55%),radial-gradient(ellipse at 85% 75%,rgba(0,229,255,0.05),transparent 55%);pointer-events:none;z-index:0}
#app{position:relative;z-index:1}

.topbar{background:var(--glass);backdrop-filter:blur(20px);padding:10px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(0,229,255,0.2);position:sticky;top:0;z-index:100;gap:10px}
.navtabs{background:rgba(7,11,23,0.97);padding:6px 14px;display:flex;gap:6px;align-items:center;border-bottom:1px solid rgba(0,229,255,0.15);overflow-x:auto;flex-wrap:nowrap}
.navtab{display:flex;flex-direction:row;align-items:center;gap:9px;padding:9px 18px;cursor:pointer;border:1px solid rgba(255,255,255,0.08);border-radius:10px;background:rgba(255,255,255,0.03);color:#6B7A8D;font-family:Space Grotesk,Noto Sans Thai,sans-serif;font-weight:600;transition:all .18s;min-width:0;white-space:nowrap;flex-shrink:0;text-align:left}
.navtab .te{font-size:22px;flex-shrink:0;line-height:1}
.navtab .tx{display:flex;flex-direction:column;gap:1px}
.navtab .tl{font-size:13px;font-weight:700;line-height:1.2}
.navtab .ts{font-size:9px;font-weight:400;opacity:.55;letter-spacing:.2px}
.navtab:hover{color:#E8ECF1;background:rgba(255,255,255,0.07);border-color:rgba(255,255,255,0.15)}
.navtab.active{border-width:1.5px;box-shadow:0 0 14px rgba(0,0,0,0.3) inset}
.navtab.active .tl{font-weight:700}
.navdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-left:2px;box-shadow:0 0 5px currentColor}
.notifstrip{background:rgba(0,229,255,0.03);border-bottom:1px solid var(--bd);padding:5px 18px;display:flex;gap:12px;overflow-x:auto;align-items:center;font-size:11px}
.main{padding:14px;max-width:1100px;margin:0 auto}

.gc{background:var(--glass);border:1px solid var(--bd);border-radius:16px;backdrop-filter:blur(12px);margin-bottom:12px;overflow:hidden}
.gh{padding:11px 17px;font-weight:700;font-size:12px;color:var(--silver);border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;font-family:'Space Grotesk',sans-serif}
.gb{padding:14px 17px}

.mr{display:flex;gap:9px;flex-wrap:wrap;margin-bottom:12px}
.mc{background:var(--glass);border-radius:12px;padding:11px 13px;flex:1;min-width:108px;backdrop-filter:blur(8px)}
.mc .l{font-size:9px;color:var(--slate);text-transform:uppercase;letter-spacing:.8px;margin-bottom:3px;font-family:'Space Grotesk',sans-serif}
.mc .v{font-family:'JetBrains Mono',monospace;font-size:17px;font-weight:700;line-height:1.2}
.mc .u{font-size:9px;color:var(--slate);margin-top:1px}
.mc .s{font-size:9px;margin-top:2px;font-weight:600}

.tw{border-radius:10px;border:1px solid var(--bd);overflow-x:auto;margin-bottom:10px}
table{width:100%;border-collapse:collapse;font-size:11px}
thead th{background:var(--void);color:var(--cyan);padding:7px 10px;font-weight:700;font-size:9px;font-family:'Space Grotesk',sans-serif;letter-spacing:.5px;border-bottom:1px solid rgba(0,229,255,0.22);white-space:nowrap;text-align:left}
thead th.r{text-align:right}
tbody td{padding:6px 10px;border-bottom:1px solid rgba(0,229,255,0.06);white-space:nowrap;color:var(--silver)}
tbody td.r{text-align:right;font-family:'JetBrains Mono',monospace}
tbody tr:nth-child(even){background:rgba(0,229,255,0.018)}

.badge{display:inline-block;padding:2px 8px;border-radius:5px;font-size:9px;font-weight:700;font-family:'Space Grotesk',sans-serif;border:1px solid transparent}
.btn{border-radius:8px;font-weight:700;font-family:'Space Grotesk','Noto Sans Thai',sans-serif;cursor:pointer;display:inline-flex;align-items:center;gap:5px;border:1px solid transparent;padding:7px 15px;font-size:12px;transition:filter .15s}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn:hover:not(:disabled){filter:brightness(1.1)}
.btn-c{background:var(--cd);color:var(--cyan);border-color:rgba(0,229,255,0.3)}
.btn-v{background:var(--vd);color:var(--violet);border-color:rgba(123,97,255,0.3)}
.btn-ok{background:rgba(0,214,143,0.12);color:var(--ok);border-color:rgba(0,214,143,0.3)}
.btn-e{background:rgba(255,71,87,0.12);color:var(--err);border-color:rgba(255,71,87,0.3)}
.btn-w{background:rgba(255,184,0,0.12);color:var(--warn);border-color:rgba(255,184,0,0.3)}
.btn-g{background:transparent;color:var(--slate);border-color:var(--bd)}
.btn-sm{padding:4px 10px;font-size:10px}

.fr{display:flex;gap:9px;flex-wrap:wrap;align-items:flex-end;margin-bottom:10px}
.fg{display:flex;flex-direction:column;gap:3px}
.fg label{font-size:9px;font-weight:700;color:var(--slate);text-transform:uppercase;letter-spacing:.5px;font-family:'Space Grotesk',sans-serif}
.fg input,.fg select{background:rgba(10,15,30,0.85);border:1px solid var(--bd);border-radius:8px;padding:6px 9px;font-size:12px;color:var(--silver);outline:none;font-family:'Noto Sans Thai',sans-serif}
.fg input[type=number]{font-family:'JetBrains Mono',monospace}
.fg input:focus,.fg select:focus{border-color:rgba(0,229,255,0.45)}
.fg select option{background:#0A0F1E}
.divider{border:none;border-top:1px solid var(--bd);margin:10px 0}

.nt{background:rgba(255,255,255,0.04);border-radius:4px;height:8px;overflow:hidden;margin-bottom:9px}
.nf{height:100%;border-radius:4px;transition:width .5s}

.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:700px){.g2{grid-template-columns:1fr}}

.role-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.role-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:510px;width:100%}
.role-card{background:var(--glass);border:1px solid var(--bd);border-radius:14px;padding:18px 12px;cursor:pointer;text-align:center;backdrop-filter:blur(10px);transition:all .2s;font-family:'Noto Sans Thai',sans-serif}
.role-card:hover{transform:translateY(-3px)}

.pill{display:flex;align-items:center;gap:3px;padding:3px 8px;border-radius:16px}
.dot{width:6px;height:6px;border-radius:50%}
.cspin{animation:spin 1s linear infinite;display:inline-block}
.cpulse{animation:cpulse 2s ease infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes cpulse{0%,100%{opacity:1}50%{opacity:.3}}

.bi{padding:9px 11px;border-radius:9px;border:1px solid var(--bd);margin-bottom:7px;cursor:pointer;transition:border-color .2s}
.bi.sel{border-color:rgba(0,214,143,0.5);background:rgba(0,214,143,0.07)}

.filterbar{background:rgba(7,11,23,0.9);padding:5px 18px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(0,229,255,0.1);flex-wrap:wrap}
.filterbar label{font-size:9px;font-weight:700;color:#6B7A8D;text-transform:uppercase;letter-spacing:.8px;font-family:Space Grotesk,sans-serif}
.filterbar input[type=date]{background:rgba(10,15,30,0.85);border:1px solid rgba(0,229,255,0.2);border-radius:8px;padding:4px 9px;font-size:12px;color:#E8ECF1;outline:none;font-family:JetBrains Mono,monospace}
.filterbar input[type=date]:focus{border-color:rgba(0,229,255,0.45)}
.factive{background:rgba(0,229,255,0.12);border:1px solid rgba(0,229,255,0.4);color:#00E5FF;padding:3px 9px;border-radius:14px;font-size:9px;font-weight:700;font-family:Space Grotesk,sans-serif}
.connok{background:rgba(0,214,143,0.12);color:var(--ok);border:1px solid rgba(0,214,143,0.3);padding:3px 9px;border-radius:14px;font-size:9px;font-weight:700;font-family:'Space Grotesk',sans-serif}
.connwarn{background:rgba(255,184,0,0.12);color:var(--warn);border:1px solid rgba(255,184,0,0.3);padding:3px 9px;border-radius:14px;font-size:9px;font-weight:700;font-family:'Space Grotesk',sans-serif}

::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:rgba(0,229,255,0.2);border-radius:2px}
@media print{.topbar,.navtabs,.notifstrip,.btn,.filterbar{display:none!important}}
</style>
</head>

function getMSAL(){
  if(!msalApp){ try{ msalApp=new msal.PublicClientApplication(MSAL_CFG); }catch(e){ console.error('MSAL init:',e); } }
  return msalApp;

async function getSPToken(){
  var app = getMSAL();
  if(!app) return null;
  var accounts = app.getAllAccounts();
  var req = { scopes: SP_SCOPES, account: accounts[0]||null };
  try{
    var res = accounts.length>0 ? await app.acquireTokenSilent(req) : await app.acquireTokenPopup(req);
    return res.accessToken;
  }catch(e){
    try{ var res2 = await app.acquireTokenPopup(req); return res2.accessToken; }
    catch(e2){ spError='Login failed: '+e2.message; return null; }
  }
}

async function fetchRMReceive(){
  if(spLoading) return;
  spLoading=true; spError=null;
  renderProcSection();
  try{
    var token = await getSPToken();
    if(!token){ spLoading=false; renderProcSection(); return; }
    var res = await fetch(SP_API, { headers:{ Authorization:'Bearer '+token, Accept:'application/json' }});
    if(!res.ok){ throw new Error('HTTP '+res.status+' — '+await res.text()); }
    var json = await res.json();
    var vals = json.values||[];
    if(vals.length<2){ spData=[]; spLastFetch=new Date(); spLoading=false; renderProcSection(); return; }
    // Row 0 = headers
    var hdrs = vals[0].map(function(h){ return String(h).trim().toLowerCase(); });
    var rows = vals.slice(1).filter(function(r){ return r.some(function(c){return c!==null&&c!=='';}) ;}).map(function(r){
      var obj={};
      hdrs.forEach(function(h,i){ obj[h]=r[i]!==null&&r[i]!==undefined?String(r[i]).trim():''; });
      return obj;
    });
    spData = rows;
    spLastFetch = new Date();
  }catch(e){
    spError = e.message;
    console.error('SharePoint fetch error:',e);
  }
  spLoading=false;
  render(); // full re-render to show updated procurement
}

// ─── Parse SP date value (Excel serial or string) ──────────────────
function parseSpDate(val){
  if(!val) return '';
  // Excel serial number (days since 1899-12-30)
  var n = parseFloat(val);
  if(!isNaN(n) && n>40000){
    var d = new Date(Date.UTC(1899,11,30) + n*864e5);
    return d.toISOString().slice(0,10);
  }
  // Already string like "22/05/2026" or "2026-05-22"
  return String(val).slice(0,10);
}

// ─── Filter SP rows for a given date ─────────────────────────────
function spForDate(dateStr){
  if(!spData) return [];
  return spData.filter(function(r){
    var keys = Object.keys(r);
    // Try common date column names
    var dateCols = keys.filter(function(k){ return k.indexOf('วัน')>=0||k.indexOf('date')>=0||k==='d'||k==='วันที่'; });
    if(!dateCols.length) dateCols=[keys[0]]; // fallback to first col
    return dateCols.some(function(k){ return parseSpDate(r[k])===dateStr; });
  });
}

// ── COMPONENTS ─────────────────────────────────────────────────────
function MC(label,val,unit,color,sub){
  return '<div class="mc" style="border-left:3px solid '+color+';border-color:'+color+'22">'+
    '<div class="l">'+label+'</div>'+
    '<div class="v" style="color:'+color+'">'+val+'</div>'+
    (unit?'<div class="u">'+unit+'</div>':'')+
    (sub?'<div class="s" style="color:'+color+'">'+sub+'</div>':'')+
    '</div>';
}
function MR(){return '<div class="mr">'+Array.from(arguments).join('')+'</div>';}
function GC(title,icon,acc,body,badge){
  var bHTML = badge||'';
  return '<div class="gc" style="border-color:'+(acc||'rgba(0,229,255,0.12)')+'">'+
    '<div class="gh"><span>'+(icon?'<span style="font-size:13px;margin-right:6px">'+icon+'</span>':'')+title+'</span>'+bHTML+'</div>'+
    '<div class="gb">'+body+'</div></div>';
}
function BD(lbl,c,b){
  return '<span class="badge" style="color:'+c+';background:'+b+';border-color:'+c+'30">'+esc(lbl)+'</span>';
}
function NB(val,max,c){
  var p = max>0?Math.min(val/max*100,100):0;
  return '<div class="nt"><div class="nf" style="width:'+p+'%;background:'+c+';box-shadow:0 0 8px '+c+'50"></div></div>';
}
function BTN(id,text,cls){
  return '<button id="'+id+'" class="btn '+cls+'">'+text+'</button>';
}
function FG(label,id,type,val,extra){
  extra=extra||'';
  return '<div class="fg"><label>'+label+'</label><input type="'+type+'" id="'+id+'" value="'+esc(val)+'" '+extra+'></div>';
}
function SL(label,id,opts,val){
  var ops=opts.map(function(o){
    var v=o.v||o, l=o.l||o;
    return '<option value="'+esc(v)+'"'+(v===val?' selected':'')+'>'+esc(l)+'</option>';
  }).join('');
  return '<div class="fg"><label>'+label+'</label><select id="'+id+'">'+ops+'</select></div>';
}
function FR(){return '<div class="fr">'+Array.from(arguments).join('')+'</div>';}
function IB(html,c){
  return '<div style="background:'+c+'0F;border:1px solid '+c+'25;border-radius:9px;padding:9px 12px;margin-bottom:10px;font-size:12px">'+html+'</div>';
}

// ── SHAREPOINT RM RECEIVE WIDGET ─────────────────────────────────
function renderSPWidget(){
  var dateToShow = filterDate||tod();
  var rows = spData ? spForDate(dateToShow) : null;

  // ── Status bar
  var statusHtml = '';
  if(spLoading){
    statusHtml = '<div style="display:flex;align-items:center;gap:8px;padding:10px;color:#FFB800;font-size:12px"><span style="animation:spin 1s linear infinite;display:inline-block">⟳</span> กำลังดึงข้อมูลจาก SharePoint...</div>';
  } else if(spError){
    statusHtml = '<div style="padding:10px;color:#FF4757;font-size:12px">⚠ '+esc(spError)+'<br><button id="btnSPRetry" class="btn btn-e btn-sm" style="margin-top:6px">↺ ลองใหม่</button></div>';
  } else if(!spData){
    statusHtml = '<div style="padding:12px;text-align:center"><button id="btnSPFetch" class="btn btn-c" style="gap:8px">🔄 ดึงข้อมูล RM Receive จาก SharePoint</button><div style="color:#6B7A8D;font-size:10px;margin-top:6px">เชื่อมต่อ ksthatyai365 SharePoint | sheet: rm recive</div></div>';
  } else {
    var lastFetchStr = spLastFetch?spLastFetch.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit',second:'2-digit'}):'—';
    statusHtml = '<div style="display:flex;align-items:center;gap:8px;font-size:10px;padding:6px 0;border-bottom:1px solid rgba(0,229,255,0.1);margin-bottom:10px">'+
      '<span style="color:#00D68F">●</span><span style="color:#6B7A8D">SharePoint RM Receive | ดึงข้อมูลล่าสุด: '+lastFetchStr+'</span>'+
      '<button id="btnSPRefresh" class="btn btn-g btn-sm" style="margin-left:auto;padding:2px 8px;font-size:9px">↺ Refresh</button>'+
      '</div>';
  }

  if(!rows) return '<div id="spSection">'+statusHtml+'</div>';

  // ── Today's summary
  var totKg   = rows.reduce(function(a,r){ var keys=Object.keys(r); var wk=keys.find(function(k){return k.indexOf('น้ำหนัก')>=0||k.indexOf('weight')>=0||k.indexOf('kg')>=0||k==='wt';}); return a+(wk?parseFloat(r[wk])||0:0); },0);
  var farms   = {};
  var sizes   = {};
  rows.forEach(function(r){
    var keys=Object.keys(r);
    var fk = keys.find(function(k){return k.indexOf('farm')>=0||k.indexOf('ฟาร์ม')>=0||k.indexOf('รหัส')>=0||k==='farm_code'||k==='farm code';});
    var sk = keys.find(function(k){return k.indexOf('size')>=0||k.indexOf('ขนาด')>=0||k.indexOf('size')>=0;});
    var wk = keys.find(function(k){return k.indexOf('น้ำหนัก')>=0||k.indexOf('weight')>=0||k.indexOf('kg')>=0||k==='wt';});
    var farm = fk?r[fk]:'?'; var sz = sk?r[sk]:'?'; var kg = wk?parseFloat(r[wk])||0:0;
    farms[farm]=(farms[farm]||0)+kg;
    sizes[sz]=(sizes[sz]||0)+kg;
  });

  // KPI summary
  var kpiHtml = '<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px">'+
    MC('รับ RM วันที่ '+dateToShow, rows.length, 'รายการ', '#00D68F')+
    MC('น้ำหนักรวม', fmt(totKg,1), 'kg', '#FFB800', Object.keys(farms).length+' ฟาร์ม')+
    MC('ฟาร์ม/Supplier', Object.keys(farms).length, 'ราย', '#7B61FF')+
    '</div>';

  // Size breakdown bar
  var szKeys = Object.keys(sizes).filter(function(k){return k&&k!=='?';});
  var szBarHtml = szKeys.length?'<div style="margin-bottom:10px">'+
    '<div style="font-size:9px;color:#6B7A8D;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;font-family:Space Grotesk,sans-serif">น้ำหนักแยกขนาด (kg)</div>'+
    '<div style="display:flex;gap:6px;flex-wrap:wrap">'+
    szKeys.sort().map(function(sz){
      return '<div style="background:rgba(0,229,255,0.08);border:1px solid rgba(0,229,255,0.2);border-radius:8px;padding:6px 10px;text-align:center;min-width:80px">'+
        '<div style="font-size:10px;color:#00E5FF;font-weight:700">'+esc(sz)+'</div>'+
        '<div style="font-family:JetBrains Mono,monospace;font-weight:700;color:#E8ECF1;font-size:13px">'+fmt(sizes[sz],1)+'</div>'+
        '<div style="font-size:9px;color:#6B7A8D">kg</div></div>';
    }).join('')+'</div></div>':'';

  // Rows table — dynamic columns from first row
  var tableHtml = '';
  if(rows.length){
    var allKeys = Object.keys(rows[0]);
    // Put date-like first, skip empty cols
    var dateKeys = allKeys.filter(function(k){return k.indexOf('วัน')>=0||k.indexOf('date')>=0;});
    var otherKeys = allKeys.filter(function(k){return dateKeys.indexOf(k)<0;});
    var colOrder = dateKeys.concat(otherKeys).filter(function(k){return rows.some(function(r){return r[k]&&r[k]!=='';});}).slice(0,12);

    var rowsHtml = rows.map(function(r,i){
      return '<tr>'+colOrder.map(function(k){
        var v = r[k]||'—';
        // Highlight weight/price cols
        var isNum = !isNaN(parseFloat(v));
        var color = (k.indexOf('น้ำหนัก')>=0||k.indexOf('weight')>=0||k==='wt')?'#FFB800':
                    (k.indexOf('ราคา')>=0||k.indexOf('price')>=0)?'#00D68F':'';
        return '<td style="'+(color?'color:'+color+';':'')+(isNum?'font-family:JetBrains Mono,monospace;text-align:right;':'')+'">'+esc(v)+'</td>';
      }).join('')+'</tr>';
    }).join('');

    tableHtml = '<div class="tw" style="max-height:320px;overflow-y:auto">'+
      '<table style="font-size:11px"><thead><tr>'+
      colOrder.map(function(k){return '<th style="font-size:9px">'+esc(k.toUpperCase())+'</th>';}).join('')+
      '</tr></thead><tbody>'+rowsHtml+'</tbody></table></div>';
  } else {
    tableHtml = '<div style="color:#6B7A8D;text-align:center;padding:20px;font-size:12px">ไม่มีรายการรับ RM วันที่ '+dateToShow+'</div>';
  }

  return '<div id="spSection">'+statusHtml+kpiHtml+szBarHtml+tableHtml+'</div>';
}

       FG('MHR','prdMhr','number',prd.mhr,'style="width:72px" placeholder="man-hrs"'))+

  // P&L status card

    '<div><div style="color:#6B7A8D;font-size:9px;text-transform:uppercase;margin-bottom:2px">RM Cost/kg FG</div><div style="font-family:JetBrains Mono,monospace;font-weight:700;color:#FF4757">'+(totRmCostPerFg>0?'฿'+totRmCostPerFg.toFixed(1):'—')+'/kg FG</div></div>'+
    '<div><div style="color:#6B7A8D;font-size:9px;text-transform:uppercase;margin-bottom:2px">Proc Cost</div><div style="font-family:JetBrains Mono,monospace;font-weight:700;color:#6B7A8D">฿'+sp.p.toFixed(2)+'/kg FG</div></div>'+

      '<td>'+sp2.p.toFixed(2)+'</td>'+
      '<td style="color:#FFB800">'+sp2.usSK.toFixed(2)+'</td>'+
      '<td style="color:#6B7A8D">'+sp2.usSF.toFixed(2)+'</td>'+
      '<td style="font-size:10px;color:#6B7A8D">'+sp2.bagsMin+'–'+sp2.bagsMax+'</td>'+

// ── QC ──────────────────────────────────────────────────────────────
function renderQC(){
  var d2=fd();
  var pending  = d2.qc.filter(function(q){return q.status==='pending';});
  var approved = d2.qc.filter(function(q){return q.status==='approved';});
  var onHold   = d2.qc.filter(function(q){return q.status==='hold';});
  var avgA     = approved.length>0?approved.reduce(function(a,q){return a+(q.gradeA||0);},0)/approved.length:0;
  var sel      = data.qc.find(function(q){return q.id===selBatch;});
  var tot      = +gr.a+ +gr.b+ +gr.c+ +gr.d+ +gr.bk;
  var valid    = Math.abs(tot-100)<1;

  // Count per bag spec check
  var selSpec = sel?SPEC[sel.size]||null:null;
  var countOk = selSpec&&gr.countBag>0?(gr.countBag>=selSpec.bagsMin&&gr.countBag<=selSpec.bagsMax):null;
  var countColor = countOk===null?'#6B7A8D':countOk?'#00D68F':'#FF4757';
  var countMsg = selSpec&&gr.countBag>0?(
    countOk?'✓ ในสเปก ('+selSpec.bagsMin+'–'+selSpec.bagsMax+' ตัว/ถุง)':
    '⚠ นอกสเปก! สเปก: '+selSpec.bagsMin+'–'+selSpec.bagsMax+' | นับได้: '+gr.countBag
  ):(selSpec?'สเปก: '+(selSpec.bagsMin)+'–'+(selSpec.bagsMax)+' ตัว/ถุง':'');

  // Revenue preview by grade (A→SK, B/C→SF, D/BK→by-product)
  var revPreview='';
  if(sel&&tot>0){
    var sp2 = SPEC[sel.size]||SPEC['31/40'];
    var fgA=sel.fgKg*gr.a/100, fgB=sel.fgKg*gr.b/100, fgC=sel.fgKg*gr.c/100;
    var revA=fgA*(sp2.usSK*FX), revB=fgB*(sp2.usSF*FX), revC=fgC*(sp2.usSF*0.85*FX);

    var bagsA=calcBags(fgA), bagsBC=calcBags(fgB+fgC);

      '<div style="font-size:9px;color:#6B7A8D;font-family:Space Grotesk,sans-serif;letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px">Revenue Preview ('+sel.size+')</div>'+
      '<div style="display:flex;gap:14px;flex-wrap:wrap;font-family:JetBrains Mono,monospace">'+
      '<div><div style="color:#6B7A8D;font-size:8px">Grade A (SK) '+gr.a+'%</div><div style="color:#00D68F;font-weight:700">฿'+fmt(Math.round(revA))+'</div><div style="font-size:9px;color:#6B7A8D">'+fmt(fgA,1)+' kg / '+bagsA+' bags</div></div>'+
      '<div><div style="color:#6B7A8D;font-size:8px">Grade B+C (SF) '+(+gr.b+ +gr.c)+'%</div><div style="color:#FFB800;font-weight:700">฿'+fmt(Math.round(revB+revC))+'</div><div style="font-size:9px;color:#6B7A8D">'+fmt(fgB+fgC,1)+' kg / '+bagsBC+' bags</div></div>'+
      '<div><div style="color:#6B7A8D;font-size:8px">Revenue QC</div><div style="color:#7B61FF;font-weight:700;font-size:14px">฿'+fmt(Math.round(totRev))+'</div></div>'+
      '</div></div>';
  }

  // Batch list
  var batchItems=d2.qc.slice().sort(function(a,b){return b.createdAt-a.createdAt;}).map(function(q){
    var isSel=selBatch===q.id;
    var sc={approved:'#00D68F',hold:'#FF4757',pending:'#FFB800'}[q.status]||'#6B7A8D';
    var sp3=SPEC[q.size];
    var extra=q.status!=='pending'?
      '<div style="font-size:10px;color:#6B7A8D;margin-top:3px">%A:'+q.gradeA+' %B:'+q.gradeB+' %C:'+q.gradeC+' %D:'+q.gradeD+' %BK:'+q.gradeBK+
      ' | Defect:'+q.defectPct+'%'+(q.countPerBag?' | Count:'+q.countPerBag+'/bag':'')+
      (q.rmType?' | '+({fresh:'สด',thawed:'ละลาย',ho:'H/ON',hl:'H/L'}[q.rmType]||q.rmType):'')+'</div>':'';
    var hint=q.status==='pending'?'<div style="font-size:9px;color:'+(isSel?'#00D68F':'#6B7A8D')+';margin-top:2px">'+(isSel?'✓ เลือกแล้ว':'คลิกเพื่อตรวจ QC')+'</div>':'';
    var bags2=sp3?'(spec: '+sp3.bagsMin+'–'+sp3.bagsMax+' ตัว/ถุง)':'';
    return '<div class="bi'+(isSel?' sel':'')+'" '+(q.status==='pending'?'data-batchid="'+q.id+'"':'')+'>'+
      '<div style="display:flex;justify-content:space-between;align-items:flex-start">'+
      '<div><b style="font-size:12px">'+esc(q.date||'')+'</b>'+

function renderManagement(){
  var totFgPlan=data.orders.reduce(function(a,o){return a+(o.kgFg||0);},0);
  var totRevPlan=data.orders.reduce(function(a,o){return a+(o.revThb||0);},0);
  var totRmPlan=data.orders.reduce(function(a,o){return a+(o.kgRm||0);},0);
  var totPo=data.pos.filter(function(p){return p.status!=='cancelled';}).reduce(function(a,p){return a+(p.qty||0);},0);
  var totRmCost=data.pos.reduce(function(a,p){return a+(p.qty||0)*(p.price||0);},0);
  var totFgAct=data.actuals.reduce(function(a,x){return a+(x.fgKg||0);},0);
  var totOH=data.actuals.reduce(function(a,x){return a+(x.ohCost||0);},0);
  var approved=data.qc.filter(function(q){return q.status==='approved';});
  var totApp=approved.reduce(function(a,q){return a+(q.fgKg||0);},0);
  var ships=data.shipments.filter(function(s){return !s.isInventory&&s.containerNo;});
  var totShip=ships.reduce(function(a,s){return a+(s.kgFg||0);},0);
  var totRevR=ships.reduce(function(a,s){return a+(s.revThb||0);},0);
  var avgA=approved.length>0?approved.reduce(function(a,q){return a+(q.gradeA||0);},0)/approved.length:0;
  var gp=totRevR-totRmCost-totOH;

  var plItems=[
    {l:'Revenue',v:totRevR,c:'#00D68F'},
    {l:'RM Cost',v:-totRmCost,c:'#FF4757'},
    {l:'OH Cost',v:-totOH,c:'#FFB800'},
    {l:'Gross Profit',v:gp,c:gp>=0?'#00D68F':'#FF4757',bold:true}
  ].map(function(item){

      '<div style="font-family:JetBrains Mono,monospace;font-size:16px;font-weight:700;color:'+item.c+'">'+(item.v>=0?'+':'')+fmt(Math.round(item.v/1000))+'K ฿</div>'+
      (item.bold?'<div style="font-size:9px;color:#00E5FF;font-weight:700;margin-top:2px">'+pct(gpPct)+'</div>':'')+
      '</div>';
  }).join('');
  var plCard=GC('P&L WATERFALL','💰','rgba(0,229,255,0.28)','<div style="display:flex;gap:9px;flex-wrap:wrap">'+plItems+'</div>');

  var pipeItems=[
    {l:'📋 Orders',v:totFgPlan,max:totFgPlan,c:'#7B61FF'},
    {l:'🛒 RM Committed',v:totPo,max:totRmPlan,c:'#FFB800'},
    {l:'🏭 FG Produced',v:totFgAct,max:totFgPlan,c:'#00E5FF'},
    {l:'🔬 QC Approved',v:totApp,max:totFgAct,c:'#00D68F'},
    {l:'📦 Shipped',v:totShip,max:totApp,c:'#FF9F43'}
  ].map(function(item){
    var pv=item.max>0?Math.min(item.v/item.max*100,100):0;
    return '<div style="margin-bottom:9px"><div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:2px"><span style="font-weight:600">'+item.l+'</span><span style="font-family:JetBrains Mono,monospace;color:'+item.c+';font-size:10px">'+fmt(item.v)+' kg · '+pct(pv)+'</span></div>'+NB(item.v,item.max,item.c)+'</div>';
  }).join('');

  var notifs=(data.notifications||[]).slice().sort(function(a,b){return b.time-a.time;}).slice(0,10);
  var notifItems=notifs.map(function(n){
    var r2=ROLES.find(function(x){return x.id===n.dept;})||ROLES[0];
    return '<div style="display:flex;gap:7px;padding:7px 0;border-bottom:1px solid rgba(0,229,255,0.08)">'+
      '<span style="font-size:14px">'+r2.e+'</span>'+
      '<div style="flex:1"><div style="font-size:11px;color:#E8ECF1">'+esc(n.msg||'')+'</div>'+
      '<div style="font-size:8.5px;color:#6B7A8D;margin-top:1px;font-family:Space Grotesk,sans-serif">'+r2.l+' · '+ts(n.time)+'</div></div>'+
      BD(r2.s,r2.c,r2.b)+'</div>';
  }).join('');

  var deptItems=[
    {r:ROLES[0],c:data.orders.length,l:data.orders.length+' orders · FG '+fmt(totFgPlan)+' kg'},
    {r:ROLES[1],c:data.pos.length,l:data.pos.length+' POs · '+pct(totRmPlan>0?totPo/totRmPlan*100:0)+' covered'},
    {r:ROLES[2],c:data.actuals.length,l:data.actuals.length+' batches · '+fmt(totFgAct)+' kg'},
    {r:ROLES[3],c:data.qc.length,l:approved.length+' approved · %A '+pct(avgA)},
    {r:ROLES[4],c:ships.length,l:fmt(totShip)+' kg · ฿'+fmt(Math.round(totRevR/1000))+'K'}
  ].map(function(x){
    var r=x.r,c=x.c,l=x.l;
    return '<div style="background:'+(c>0?r.b:'transparent')+';border:1px solid '+(c>0?r.c+'30':'rgba(0,229,255,0.1)')+';border-radius:10px;padding:11px 13px">'+
      '<div style="display:flex;align-items:center;gap:7px;margin-bottom:5px">'+
      '<span style="font-size:17px">'+r.e+'</span>'+

      '<div style="font-size:11px;color:'+(c>0?'#E8ECF1':'#6B7A8D')+'">'+(c>0?l:'— no data —')+'</div></div>';
  }).join('');

  return MR(MC('FG PLAN','฿'+fmt(Math.round(totRevPlan/1000))+'K',fmt(totFgPlan)+' kg','#7B61FF'),
            MC('FG PRODUCED',fmt(totFgAct),'kg','#00E5FF',totFgPlan?pct(totFgAct/totFgPlan*100)+' of plan':''),
            MC('QC APPROVED',fmt(totApp),'kg','#00D68F','%A avg: '+pct(avgA)),
            MC('REVENUE','฿'+fmt(Math.round(totRevR/1000))+'K',fmt(totShip)+' kg shipped','#FFB800'),
            MC('GROSS PROFIT','฿'+fmt(Math.round(gp/1000))+'K',pct(gpPct)+' GP%',gp>=0?'#00D68F':'#FF4757'))+
    plCard+
    '<div class="g2">'+
    GC('PRODUCTION PIPELINE','⚡','rgba(0,229,255,0.22)',pipeItems)+
    GC('ACTIVITY FEED','🔔','rgba(0,229,255,0.22)',
      notifs.length?'<div style="max-height:280px;overflow-y:auto">'+notifItems+'</div>':'<div style="color:#6B7A8D;text-align:center;padding:20px">— no activity —</div>',
      BD(notifs.length+' events','#00E5FF','rgba(0,229,255,0.12)'))+
    '</div>'+
    GC('DEPARTMENT STATUS','🏢','rgba(0,229,255,0.22)',
      '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:9px">'+deptItems+'</div>');
}

// ── BIND EVENTS ─────────────────────────────────────────────────────
function bindRoleCards(){
  document.querySelectorAll('.role-card').forEach(function(card){
    var rid=card.getAttribute('data-role');
    card.addEventListener('mouseenter',function(){
      var r=ROLES.find(function(x){return x.id===rid;})||ROLES[0];
      card.style.background=r.b;card.style.borderColor=r.c+'50';
      card.style.boxShadow='0 0 24px '+r.c+'20';
    });
    card.addEventListener('mouseleave',function(){
      card.style.background='rgba(26,31,62,0.7)';card.style.borderColor='rgba(0,229,255,0.12)';card.style.boxShadow='';
    });
    card.addEventListener('click',function(){role=rid;render();});
  });
}

function getVal(id){var e=document.getElementById(id);return e?e.value:'';}
function getNum(id){var v=parseFloat(getVal(id));return isNaN(v)?0:v;}

function switchRole(rid){
  role=rid;
  selBatch=null;
  render();
}
function bindAll(){
  // Del order
  document.querySelectorAll('.del-order').forEach(function(btn){
    btn.onclick=function(){fbDel('orders',btn.getAttribute('data-id'));};
  });
  // PO recv/cancel
  document.querySelectorAll('.po-recv').forEach(function(btn){
    btn.onclick=function(){
      fbUpd('pos',btn.getAttribute('data-id'),{status:'received'});
      fbNotif('procurement','รับ RM: '+btn.getAttribute('data-farm')+' '+fmt(btn.getAttribute('data-qty'))+' kg');
    };
  });
  document.querySelectorAll('.po-cancel').forEach(function(btn){
    btn.onclick=function(){fbUpd('pos',btn.getAttribute('data-id'),{status:'cancelled'});};
  });
  // QC batch select
  document.querySelectorAll('.bi[data-batchid]').forEach(function(bi){
    bi.onclick=function(){
      var bid=bi.getAttribute('data-batchid');
      selBatch=(selBatch===bid)?null:bid;
      render();
    };
  });

  // Planning form live update
  ['pfSz','pfCt','pfPr','pfNote'].forEach(function(id){
    var el=document.getElementById(id);
    if(!el)return;
    el.onchange=el.oninput=function(){
      pf.sz=getVal('pfSz')||pf.sz;
      pf.ct=getNum('pfCt')||pf.ct;
      pf.pr=getVal('pfPr');
      pf.note=getVal('pfNote');
      var sp=spv(pf.sz);var fgKg=(pf.ct||0)*KGC;var rmKg=fgKg/sp.y;
      var revThb=fgKg*(parseFloat(pf.pr)||sp.u)*FX*2.20462;
      var beRm=((parseFloat(pf.pr)||sp.u)*FX*2.20462-sp.p)*sp.y;
    };
  });
  ['tfDt','tfFg'].forEach(function(id){
    var el=document.getElementById(id);if(!el)return;
    el.oninput=function(){tf.dt=getVal('tfDt')||tf.dt;tf.fg=getNum('tfFg')||tf.fg;};
  });
  ['pofFarm','pofSz','pofQty','pofPr','pofDt','pofSt'].forEach(function(id){
    var el=document.getElementById(id);if(!el)return;
    el.oninput=el.onchange=function(){
      pof.farm=getVal('pofFarm');pof.sz=getVal('pofSz')||pof.sz;
      pof.qty=getVal('pofQty');pof.pr=getVal('pofPr');
      pof.dt=getVal('pofDt')||pof.dt;pof.status=getVal('pofSt')||pof.status;
    };
  });
  ['prdDt','prdSz','prdFg','prdRm','prdMhr','prdShift','prdRmType'].forEach(function(id){
    var el=document.getElementById(id);if(!el)return;
    el.oninput=el.onchange=function(){
      prd.dt=getVal('prdDt')||prd.dt;prd.sz=getVal('prdSz')||prd.sz;
      prd.fg=getNum('prdFg');prd.rm=getNum('prdRm');
      prd.mhr=getNum('prdMhr');prd.shift=getVal('prdShift')||prd.shift;
      prd.rmType=getVal('prdRmType')||prd.rmType;
    };
  });
  ['shfCust','shfCon','shfSz','shfKg','shfPr','shfDt'].forEach(function(id){
    var el=document.getElementById(id);if(!el)return;
    el.oninput=el.onchange=function(){
      shf.cust=getVal('shfCust');shf.con=getVal('shfCon');
      shf.sz=getVal('shfSz')||shf.sz;shf.kg=getNum('shfKg');
      shf.pr=getVal('shfPr');shf.dt=getVal('shfDt')||shf.dt;
    };
  });
  ['grA','grB','grC','grD','grBk','grDef','grCountBag','grNotes'].forEach(function(id){
    var el=document.getElementById(id);if(!el)return;
    var kMap={'gra':'a','grb':'b','grc':'c','grd':'d','grbk':'bk','grdef':'def','grcountbag':'countBag','grnotes':'notes'};
    var k=kMap[id.toLowerCase()]||id.replace('gr','').toLowerCase();
    el.oninput=function(){gr[k]=id==='grNotes'?el.value:+el.value;};
  });

  // Action buttons
  var b;
  var chBtn=document.getElementById('btnChange');
  if(chBtn) chBtn.onclick=function(){role=null;render();};
  var fInp=document.getElementById('filterDtInp');
  if(fInp) fInp.onchange=function(){filterDate=fInp.value;render();};
  var fToday=document.getElementById('btnFToday');
  if(fToday) fToday.onclick=function(){filterDate=tod();render();};
  var fAll=document.getElementById('btnFAll');
  if(fAll) fAll.onclick=function(){filterDate='';render();};
  b=document.getElementById('btnAddOrder');
  if(b) b.onclick=function(){
    var sp=spv(pf.sz);var fgKg=(pf.ct||0)*KGC;
    var o={id:uid(),size:pf.sz,cartons:+pf.ct,kgFg:Math.round(fgKg),kgRm:Math.round(fgKg/sp.y),
      priceUsd:parseFloat(pf.pr)||sp.u,revThb:Math.round(fgKg*(parseFloat(pf.pr)||sp.u)*FX*2.20462),
      beRm:+((((parseFloat(pf.pr)||sp.u)*FX*2.20462-sp.p)*sp.y).toFixed(2)),note:pf.note,createdAt:Date.now()};
    fbSet('orders',o);fbNotif('planning','New Order: '+pf.sz+' × '+pf.ct+' cartons → '+fmt(fgKg)+' kg FG');
    pf.note='';
  };
  b=document.getElementById('btnSaveTgt');
  if(b) b.onclick=function(){
    var t={id:'tgt_'+tod(),date:tod(),fgKg:+tf.fg,rmKg:Math.round(tf.fg/0.645),createdAt:Date.now()};
    db.ref('kst/targets/'+t.id).set(t);
    fbNotif('planning','Target '+tod()+': '+fmt(tf.fg)+' kg FG/day');
  };
  b=document.getElementById('btnAddPo');
  if(b) b.onclick=function(){
    if(!pof.farm||!pof.qty||!pof.pr){alert('กรุณากรอก Farm, Qty, Price');return;}
    var po={id:uid(),farm:pof.farm,size:pof.sz,qty:+pof.qty,price:+pof.pr,
      cost:Math.round(pof.qty*pof.pr),poDate:pof.dt,status:pof.status,createdAt:Date.now()};
    fbSet('pos',po);fbNotif('procurement','PO: '+pof.farm+' — '+fmt(pof.qty)+' kg ('+pof.sz+') ฿'+pof.pr+'/kg');
    pof.farm='';pof.qty='';pof.pr='';render();
  };
  b=document.getElementById('btnAddAct');
  if(b) b.onclick=function(){
    if(!prd.fg){alert('กรุณากรอก FG kg');return;}
    var sp=SPEC[prd.sz]||SPEC['31/40'];var yldA=getYield(prd.sz,prd.rmType||'fresh');var rmU=prd.rm||(prd.fg/yldA);
    var act={id:uid(),date:prd.dt,size:prd.sz,rmType:prd.rmType||'fresh',fgKg:+prd.fg,rmKg:+rmU,
      yield:+(prd.fg/rmU*100).toFixed(1),mhr:+prd.mhr||0,shift:prd.shift,
      bags:calcBags(+prd.fg),cartons:calcCartons(calcBags(+prd.fg)),ohCost:Math.round(prd.fg*sp.p),createdAt:Date.now()};
    fbSet('actuals',act);
    var qb={id:'qc_'+uid(),prodId:act.id,date:prd.dt,size:prd.sz,rmType:prd.rmType||'fresh',fgKg:+prd.fg,
      gradeA:0,gradeB:0,gradeC:0,gradeD:0,gradeBK:0,defectPct:0,countPerBag:0,status:'pending',createdAt:Date.now()};
    fbSet('qc',qb);
    fbNotif('production','Produced '+prd.dt+': '+prd.sz+' — '+fmt(prd.fg)+' kg FG (yield '+pct(act.yield)+')');
    prd.fg='';prd.rm='';prd.mhr='';
  };
  b=document.getElementById('btnQCApprove');
  if(b) b.onclick=function(){
    if(!selBatch)return;
    var tot=+gr.a+ +gr.b+ +gr.c+ +gr.d+ +gr.bk;
    if(Math.abs(tot-100)>=1){alert('Grade ต้องรวมได้ 100%');return;}
    var sel=data.qc.find(function(q){return q.id===selBatch;});
  var qcAll=d2.qc;
    fbUpd('qc',selBatch,{gradeA:+gr.a,gradeB:+gr.b,gradeC:+gr.c,gradeD:+gr.d,gradeBK:+gr.bk,defectPct:+gr.def,countPerBag:+gr.countBag,qcNotes:gr.notes,status:'approved',qcDate:tod()});
    fbNotif('qc','QC Approved: '+(sel?sel.date:'')+' '+(sel?sel.size:'')+' — %A: '+gr.a+'%');
    selBatch=null;gr={a:0,b:0,c:0,d:0,bk:0,def:0,countBag:0,notes:''};
  };
  b=document.getElementById('btnQCHold');
  if(b) b.onclick=function(){
    if(!selBatch)return;
    var sel=data.qc.find(function(q){return q.id===selBatch;});
  var qcAll=d2.qc;
    fbUpd('qc',selBatch,{gradeA:+gr.a,gradeB:+gr.b,gradeC:+gr.c,gradeD:+gr.d,gradeBK:+gr.bk,defectPct:+gr.def,countPerBag:+gr.countBag,qcNotes:gr.notes,status:'hold',qcDate:tod()});
    fbNotif('qc','QC HOLD: '+(sel?sel.date:'')+' '+(sel?sel.size:''));
    selBatch=null;
  };
  bindSPButtons();
  b=document.getElementById('btnAddShip');
  if(b) b.onclick=function(){
    if(!shf.cust||!shf.kg){alert('กรุณากรอก Customer และ FG kg');return;}
    var pr2=parseFloat(shf.pr)||spv(shf.sz).u;
    var ship={id:uid(),isInventory:false,customer:shf.cust,containerNo:shf.con,size:shf.sz,
      kgFg:+shf.kg,priceUsd:pr2,revThb:Math.round(shf.kg*pr2*FX*2.20462),
      shipDate:shf.dt,status:'shipped',createdAt:Date.now()};
    fbSet('shipments',ship);fbNotif('sales','Shipped: '+shf.cust+' — '+fmt(shf.kg)+' kg '+shf.con);
    shf.cust='';shf.con='';shf.kg='';shf.pr='';render();
  };
}

// ── BOOT ─────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded',function(){
  initFB();
  render();
});
</script>
</body>
</html>
