<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>KST — SP Auth Test</title>
<script src="https://alcdn.msauth.net/browser/2.38.3/js/msal-browser.min.js"></script>
<style>
body{font-family:sans-serif;background:#0A0F1E;color:#E8ECF1;padding:24px;max-width:700px}
.card{background:rgba(26,31,62,0.8);border:1px solid rgba(0,229,255,0.2);border-radius:12px;padding:20px;margin-bottom:14px}
.btn{background:rgba(0,229,255,0.12);color:#00E5FF;border:1px solid rgba(0,229,255,0.4);border-radius:8px;padding:10px 20px;font-size:13px;font-weight:700;cursor:pointer;margin:4px}
.btn:hover{background:rgba(0,229,255,0.22)}
.log{background:#000;border-radius:8px;padding:12px;font-family:monospace;font-size:11px;max-height:300px;overflow-y:auto;margin-top:10px}
.ok{color:#00D68F}.warn{color:#FFB800}.err{color:#FF4757}.info{color:#00E5FF}
</style>
</head>
<body>

<div class="card">
  <h2 style="color:#00E5FF;margin-bottom:4px">🔧 KST SharePoint Auth Diagnostic</h2>
  <p style="color:#6B7A8D;font-size:12px">ทดสอบการเชื่อมต่อ MSAL + SharePoint สำหรับ kst_collab_hub_v3</p>
</div>

<div class="card">
  <b>Step 1 — ตรวจสอบ MSAL Library</b>
  <div id="msalStatus" style="margin-top:8px;color:#6B7A8D">กำลังตรวจสอบ...</div>
</div>

<div class="card">
  <b>Step 2 — ทดสอบ Login Microsoft</b><br>
  <small style="color:#6B7A8D">Redirect URI: <span id="curUri" style="color:#FFB800"></span></small>
  <br><br>
  <button class="btn" onclick="testPopup()">🔐 Test Login (Popup)</button>
  <button class="btn" onclick="testRedirect()">🔄 Test Login (Redirect)</button>
  <div id="loginStatus" style="margin-top:8px;color:#6B7A8D">—</div>
</div>

<div class="card">
  <b>Step 3 — ทดสอบ SharePoint API</b><br>
  <button class="btn" id="btnTestSP" style="display:none" onclick="testSP()">📊 Test SharePoint Fetch</button>
  <div id="spStatus" style="color:#6B7A8D">ต้อง Login ก่อน</div>
</div>

<div id="log" class="log">
  <span class="info">[boot] กำลังโหลด...</span>
</div>

<script>
const CLIENT_ID = '2459a57b-bd24-4c19-8f82-1b1d607bd11a';
const TENANT_ID = '1a4d139b-4e96-4d3b-8cfd-007453cc609e';
const REDIRECT_URI = window.location.href.split('?')[0];
const SCOPES = ['Files.Read','User.Read'];
const SHARE_ID = 'u!aHR0cHM6Ly9rc3RoYXR5YWkzNjUuc2hhcmVwb2ludC5jb20vOng6L3MvS1NUUk1VUERBVEVWMi9JUURqYzZCRkRNekRSSklnbnVFd2M0UmpBUnVYR3BUamFGSDBUUi1hVEdLNi1xZz9lPUJRdWhIUA';
const SP_API = 'https://graph.microsoft.com/v1.0/shares/'+SHARE_ID+'/driveItem/workbook/worksheets/rm%20recive/usedRange';

var msalApp = null;
var accessToken = null;

function log(msg, cls){
  var el = document.getElementById('log');
  var ts = new Date().toLocaleTimeString('th-TH');
  el.innerHTML += '<br><span class="'+(cls||'info')+'">['+ts+'] '+msg+'</span>';
  el.scrollTop = el.scrollHeight;
}

// Show current URI
document.getElementById('curUri').textContent = REDIRECT_URI;

// Step 1: Check MSAL
window.addEventListener('load', function(){
  if(typeof msal !== 'undefined'){
    document.getElementById('msalStatus').innerHTML = '<span style="color:#00D68F">✅ MSAL '+msal.version+' โหลดสำเร็จ</span>';
    log('MSAL library loaded: v'+msal.version, 'ok');

    try{
      msalApp = new msal.PublicClientApplication({
        auth:{ clientId:CLIENT_ID, authority:'https://login.microsoftonline.com/'+TENANT_ID, redirectUri:REDIRECT_URI, navigateToLoginRequestUrl:false },
        cache:{ cacheLocation:'localStorage', storeAuthStateInCookie:true }
      });
      log('MSAL app created OK','ok');

      // Handle redirect response
      msalApp.handleRedirectPromise().then(function(resp){
        if(resp && resp.accessToken){
          accessToken = resp.accessToken;
          log('✅ Redirect login success! Token received','ok');
          document.getElementById('loginStatus').innerHTML = '<span style="color:#00D68F">✅ Login สำเร็จ (redirect) — account: '+resp.account.username+'</span>';
          document.getElementById('btnTestSP').style.display='inline-block';
          testSP();
        }
      }).catch(function(e){ log('handleRedirectPromise error: '+e.message,'err'); });

      // Check existing accounts
      var accts = msalApp.getAllAccounts();
      if(accts.length){
        log('Found cached account: '+accts[0].username,'ok');
        document.getElementById('loginStatus').innerHTML = '<span style="color:#FFB800">พบ account ที่ login ไว้: '+accts[0].username+' — กด Test SP ได้เลย</span>';
        document.getElementById('btnTestSP').style.display='inline-block';
      }
    }catch(e){
      document.getElementById('msalStatus').innerHTML = '<span style="color:#FF4757">❌ MSAL init error: '+e.message+'</span>';
      log('MSAL init error: '+e.message,'err');
    }
  } else {
    document.getElementById('msalStatus').innerHTML = '<span style="color:#FF4757">❌ MSAL ไม่โหลด — CDN blocked หรือ network error</span>';
    log('MSAL library NOT loaded!','err');
  }
});

function testPopup(){
  if(!msalApp){ log('msalApp not ready','err'); return; }
  log('Attempting popup login...','info');
  document.getElementById('loginStatus').textContent = '⟳ กำลัง login...';
  msalApp.acquireTokenPopup({ scopes:SCOPES }).then(function(resp){
    accessToken = resp.accessToken;
    log('✅ Popup login success: '+resp.account.username,'ok');
    document.getElementById('loginStatus').innerHTML = '<span style="color:#00D68F">✅ Login สำเร็จ: '+resp.account.username+'</span>';
    document.getElementById('btnTestSP').style.display='inline-block';
  }).catch(function(e){
    log('Popup error ['+e.errorCode+']: '+e.message,'err');
    document.getElementById('loginStatus').innerHTML = '<span style="color:#FF4757">❌ ['+e.errorCode+'] '+e.message+'</span>';
  });
}

function testRedirect(){
  if(!msalApp){ log('msalApp not ready','err'); return; }
  log('Starting redirect login...','info');
  msalApp.loginRedirect({ scopes:SCOPES });
}

function testSP(){
  if(!accessToken){
    // Try silent first
    var accts = msalApp?msalApp.getAllAccounts():[];
    if(accts.length){
      msalApp.acquireTokenSilent({ scopes:SCOPES, account:accts[0] }).then(function(r){
        accessToken=r.accessToken; doSPFetch();
      }).catch(function(){ log('Silent failed, need popup/redirect','warn'); });
    } else { log('No token — login first','warn'); }
    return;
  }
  doSPFetch();
}

function doSPFetch(){
  log('Fetching SharePoint: rm recive sheet...','info');
  document.getElementById('spStatus').textContent = '⟳ กำลังดึงข้อมูล...';
  fetch(SP_API, { headers:{ Authorization:'Bearer '+accessToken, Accept:'application/json' }})
    .then(function(r){
      log('Response status: HTTP '+r.status, r.ok?'ok':'err');
      if(!r.ok){ return r.text().then(function(t){ throw new Error('HTTP '+r.status+': '+t.slice(0,200)); }); }
      return r.json();
    })
    .then(function(json){
      var rows = (json.values||[]).length;
      log('✅ SharePoint data received: '+rows+' rows','ok');
      document.getElementById('spStatus').innerHTML = '<span style="color:#00D68F">✅ ดึงข้อมูลสำเร็จ! '+rows+' แถว | Headers: '+(json.values&&json.values[0]?json.values[0].join(', '):'—')+'</span>';
    })
    .catch(function(e){
      log('SP API error: '+e.message,'err');
      document.getElementById('spStatus').innerHTML = '<span style="color:#FF4757">❌ '+e.message+'</span>';
    });
}
</script>
</body>
</html>
